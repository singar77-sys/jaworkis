<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- Blade body -->
  <polygon points="3,30 21,3 54,12 48,46 10,44" fill="#d4d4d6" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Blade top shine -->
  <polygon points="6,28 22,6 50,14 44,24 12,26" fill="#eaeaec" opacity="0.85"/>
  <!-- Blade bottom shadow -->
  <polygon points="14,36 48,32 48,46 10,44" fill="#aaaaae" opacity="0.7"/>
  <!-- Hole in blade spine area -->
  <circle cx="18" cy="16" r="4" fill="#111" stroke="#111" stroke-width="1"/>
  <circle cx="18" cy="16" r="2" fill="#b0b0b4"/>
  <!-- Handle -->
  <polygon points="48,40 60,48 55,62 41,54" fill="#1a1a1a" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Handle rivets -->
  <circle cx="52" cy="46" r="2.5" fill="#444"/>
  <circle cx="46" cy="56" r="2.5" fill="#444"/>
</svg>
